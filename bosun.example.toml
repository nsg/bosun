# Address Bosun listens on.
listen = "0.0.0.0:8080"

[frigate]
# Base URL of the Frigate instance to proxy to.
url = "http://localhost:5000"

# Access control is DEFAULT-DENY. A request must present a known key in the
# `X-API-Key` header, and one of that key's rules must match both the HTTP
# method and the request path. Anything not explicitly allowed is rejected.
#
# Each rule grants a set of `methods` on a set of `paths`. Path patterns use
# `*` (wildcard within one path segment) and `**` (any number of segments).

[[api_keys]]
name = "viewer"
key = "change-me-viewer-key"

  # Read-only access to events and camera snapshots.
  [[api_keys.rules]]
  methods = ["GET", "HEAD"]
  paths = [
    "/api/events",
    "/api/events/*",
    "/api/events/*/thumbnail.*",
    "/api/events/*/snapshot.jpg",
    "/api/*/latest.*",
  ]

[[api_keys]]
name = "reviewer"
key = "change-me-reviewer-key"

  # Read reviews...
  [[api_keys.rules]]
  methods = ["GET", "HEAD"]
  paths = ["/api/review", "/api/review/*"]

  # ...and mark them viewed.
  [[api_keys.rules]]
  methods = ["POST"]
  paths = ["/api/reviews/viewed"]
