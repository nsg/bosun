name: Build add-on image

# Releases whatever is on master: builds a per-architecture container image and
# publishes it to GHCR as ghcr.io/nsg/bosun-<arch>. Home Assistant pulls these
# by the version in bosun/config.yaml, so a "release" is just bumping that
# version and pushing to master — no git tags involved.
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "bosun/DOCS.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on version
        id: meta
        run: |
          version=$(grep '^version:' bosun/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/nsg/bosun-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/nsg/bosun-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
