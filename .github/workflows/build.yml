name: Build add-on image

# Releases whatever is on master: builds the container image and publishes it to
# GHCR as ghcr.io/nsg/bosun-amd64. Home Assistant pulls it by the version in
# bosun/config.yaml, so a "release" is just bumping that version and pushing to
# master — no git tags involved.
#
# amd64 only. arm64 was dropped because building it under QEMU emulation is very
# slow and there are no arm consumers; to re-add it, restore a build matrix over
# {amd64: linux/amd64, aarch64: linux/arm64}, add back docker/setup-qemu-action,
# and re-add aarch64 to `arch:` in bosun/config.yaml.
on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "bosun/DOCS.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on version
        id: meta
        run: |
          version=$(grep '^version:' bosun/config.yaml | sed -E 's/version:[[:space:]]*"?([^"]+)"?/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/nsg/bosun-amd64:${{ steps.meta.outputs.version }}
            ghcr.io/nsg/bosun-amd64:latest
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
